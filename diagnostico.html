<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diag Back Button</title>
<style>
  body { font-family: monospace; padding: 1rem; background: #1a1a1a; color: #eee; font-size: 13px; margin:0; }
  button { display: block; width: 100%; padding: 0.8rem; margin: 0.4rem 0; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: monospace; }
  .a { background: #4a9; color: white; }
  .b { background: #49a; color: white; }
  #log { background: #111; border-radius: 8px; padding: 0.8rem; margin-top: 0.5rem; height: 55vh; overflow-y: auto; }
  .ll { padding: 2px 0; border-bottom: 1px solid #222; font-size: 12px; }
  .ok { color: #4fa; } .warn { color: #fa4; } .info { color: #88f; }
  #st { background: #222; border-radius: 8px; padding: 0.6rem; margin: 0.4rem 0; font-size: 12px; }
</style>
</head>
<body>
<h3 style="color:#fa8;margin:0 0 0.3rem">Diagnóstico — Back Button PWA</h3>
<div id="st">len:<span id="sl">?</span> | stack:<span id="ss">[]</span> | pops:<span id="sp">0</span></div>
<button class="a" onclick="abrirA()">1. Abrir Drawer A</button>
<button class="b" onclick="abrirB()">2. Abrir Drawer B (por cima)</button>
<button onclick="resetar()" style="background:#555;color:#eee">↺ Resetar</button>
<p style="color:#aaa;font-size:11px;margin:0.3rem 0">Depois: voltar → voltar (2x pelo Android)</p>
<div id="log"></div>

<script>
let stack = [], pops = 0, pushed = 0;
const N = 50;

function upd() {
  document.getElementById('sl').textContent = history.length;
  document.getElementById('ss').textContent = JSON.stringify(stack);
  document.getElementById('sp').textContent = pops;
}
function log(msg, cls='') {
  const d = document.getElementById('log');
  const t = new Date().toISOString().slice(11,23);
  d.innerHTML += `<div class="ll ${cls}">[${t}] ${msg}</div>`;
  d.scrollTop = d.scrollHeight;
  upd();
}
function empurrar(n) {
  for (let i = 0; i < n; i++) history.pushState({ v:'root' }, '');
  pushed += n;
}

window.addEventListener('load', () => {
  history.replaceState({ v:'root' }, '');
  empurrar(N);
  log(`LOAD len=${history.length} pushed=${pushed}`, 'info');
});

window.addEventListener('popstate', () => {
  pops++;
  pushed = Math.max(0, pushed - 1);
  log(`POPSTATE #${pops} stack=${JSON.stringify(stack)} len=${history.length} pushed=${pushed}`, 'warn');
  if (stack.length > 0) {
    const id = stack.pop();
    log(`  fechou '${id}'`, 'ok');
  }
  const faltam = N - pushed;
  if (faltam > 0) empurrar(faltam);
  log(`  reempurrou ${faltam} → len=${history.length} pushed=${pushed}`, 'info');
});

function openD(id) {
  stack.push(id);
  history.pushState({ id }, '');
  pushed++;
  log(`openDrawer('${id}') len=${history.length}`, 'ok');
}
function abrirA() { log('--- Abrindo A ---'); openD('drawer-A'); }
function abrirB() { log('--- Abrindo B ---'); openD('drawer-B'); }
function resetar() {
  stack=[]; pops=0; pushed=0;
  document.getElementById('log').innerHTML='';
  history.replaceState({v:'root'},'');
  empurrar(N);
  log(`RESET len=${history.length}`, 'info');
}
</script>
</body>
</html>
